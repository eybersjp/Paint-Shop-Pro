<head>

    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        body { font-family: 'Manrope', sans-serif; }
        h1, h2, h3 { font-family: 'Space Grotesk', sans-serif; }

</head>
<body class="bg-surface text-on-surface antialiased pb-20">
    <header class="bg-stone-50/70 backdrop-blur-md fixed top-0 w-full z-50 shadow-sm transition-colors duration-200">
        <div class="flex justify-between items-center px-8 py-4 max-w-full mx-auto">
            <a href="index.html" class="text-2xl font-bold text-orange-900 tracking-tight font-headline">Earthbound Studio</a>
            <nav class="hidden md:flex gap-8 items-center font-label text-sm uppercase tracking-widest">
                <a class="text-stone-600 hover:text-stone-900" href="shop.html">Shop</a>
                <a class="text-stone-600 hover:text-stone-900" href="visualizer.html">Visualizer</a>
            </nav>
        </div>
    </header>

    <main class="pt-32 px-6 md:px-12 max-w-7xl mx-auto">
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-16">
            <!-- Left: Delivery Info -->
            <div class="lg:col-span-7 space-y-12">
                <section>
                    <h2 class="text-3xl font-bold mb-8 tracking-tight">Shipping Details</h2>
                    <div class="space-y-6">
                        <input type="text" id="cust-name" placeholder="Full Name" class="w-full bg-surface-container-low border-none rounded-lg p-4">
                        <input type="email" id="cust-email" placeholder="Email Address" class="w-full bg-surface-container-low border-none rounded-lg p-4">
                        <input type="text" id="cust-address" placeholder="Delivery Address" class="w-full bg-surface-container-low border-none rounded-lg p-4">
                    </div>
                </section>
                <section>
                    <h2 class="text-3xl font-bold mb-8 tracking-tight">Payment</h2>
                    <div class="p-6 rounded-lg bg-surface-container-low border-2 border-primary flex items-center gap-4">
                        <span class="material-symbols-outlined text-primary">account_balance</span>
                        <div>
                            <p class="font-bold">EFT / Direct Transfer</p>
                            <p class="text-xs text-on-surface-variant">Pay on delivery confirmed</p>
                        </div>
                    </div>
                </section>
            </div>

            <!-- Right: Order Summary -->
            <div class="lg:col-span-5">
                <div class="sticky top-32 p-8 rounded-xl bg-surface-container-low border border-outline-variant/10 shadow-lg shadow-on-surface-variant/5">
                    <h3 class="text-2xl font-bold mb-8">Cart Items</h3>
                    <div id="checkout-items" class="space-y-6 mb-10 pb-8 border-b border-outline-variant/20 italic text-outline">
                        Your landscape is empty...
                    </div>
                    <div id="checkout-totals" class="space-y-4 mb-10">
                        <!-- Totals go here -->
                    </div>
                    <button id="buy-btn" class="w-full py-5 bg-primary text-on-primary rounded-lg font-bold text-sm tracking-widest uppercase hover:bg-primary-container transition-all shadow-xl disabled:opacity-50">
                        Complete Purchase
                    </button>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = "https://jemjmdpvomorpezcouhj.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImplbWptZHB2b21vcnBlemNvdWhqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0NzEyMDIsImV4cCI6MjA5MTA0NzIwMn0.LPC0AJm6gbREFlkIMmUa22Oa-rONydEZdMULFflzCoI";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        function initCheckout() {
            const cart = JSON.parse(localStorage.getItem('cart') || '[]');
            const list = document.getElementById('checkout-items');
            const totals = document.getElementById('checkout-totals');
            const btn = document.getElementById('buy-btn');

            if (cart.length === 0) {
                btn.disabled = true;
                return;
            }

            list.innerHTML = cart.map(item => `
                <div class="flex justify-between items-center">
                    <div>
                        <h4 class="font-bold text-on-surface">${item.name}</h4>
                        <p class="text-xs text-on-surface-variant font-label">Qty: ${item.qty}</p>
                    </div>
                    <span class="font-bold text-primary">$${((item.price * item.qty)/100).toFixed(2)}</span>
                </div>
            `).join('');

            const subtotal = cart.reduce((s, i) => s + (i.price * i.qty), 0);
            const delivery = 5000; // $50.00
            const tax = Math.round(subtotal * 0.15);
            const total = subtotal + delivery + tax;

            totals.innerHTML = `
                <div class="flex justify-between text-on-surface-variant text-sm">
                    <span>Subtotal</span>
                    <span>$${(subtotal/100).toFixed(2)}</span>
                </div>
                <div class="flex justify-between text-on-surface-variant text-sm">
                    <span>Delivery (Standard)</span>
                    <span>$${(delivery/100).toFixed(2)}</span>
                </div>
                <div class="flex justify-between text-on-surface-variant text-sm pb-4 border-b border-outline-variant/20">
                    <span>VAT (15%)</span>
                    <span>$${(tax/100).toFixed(2)}</span>
                </div>
                <div class="flex justify-between text-2xl font-bold text-on-surface pt-4 font-headline">
                    <span>Total Due</span>
                    <span class="text-primary">$${(total/100).toFixed(2)}</span>
                </div>
            `;

            btn.onclick = () => processOrder(cart, total);
        }

        async function processOrder(cart, total) {
            const btn = document.getElementById('buy-btn');
            btn.disabled = true;
            btn.textContent = "Processing...";

            try {
                // 1. Create order
                const { data: order, error } = await _supabase.from('sales_orders').insert({
                    customer_id: '818013ef-f413-4228-b80e-48c8d8247190', // Default for now
                    total_minor: total,
                    status: 'CONFIRMED',
                    line_items: cart
                }).select().single();

                if (error) throw error;

                // 2. Decrement Stock
                for (const item of cart) {
                    if (item.id.includes('mock-')) continue;
                    
                    const { data: p } = await _supabase.from('products').select('stock_level').eq('id', item.id).single();
                    if (p) {
                        await _supabase.from('products').update({
                            stock_level: Math.max(0, (p.stock_level || 0) - item.qty)
                        }).eq('id', item.id);
                    }
                }

                alert('Thank you! Your order #' + (order.order_number || order.id.slice(0,8)) + ' is confirmed.');
                localStorage.removeItem('cart');
                window.location.href = 'shop.html';
            } catch (err) {
                alert('Order failure: ' + err.message);
                btn.disabled = false;
                btn.textContent = "Complete Purchase";
            }
        }

        document.addEventListener('DOMContentLoaded', initCheckout);
    </script>
</body>
</html>
